name: CI

on:
  push:
    branches: [ main, master, harden-fixes ]
  pull_request:
    branches: [ main, master ]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
      - name: Lint shell scripts
        run: shellcheck -x -S warning cmdr.sh cmdr_functions.sh lib/*.sh install.sh tests/run.sh

  test:
    name: Test suite (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install jq
      - name: Show bash version
        run: bash --version | head -1
      - name: Run tests with the OS default bash
        run: /bin/bash tests/run.sh
